<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comandos Condicionais usando javascript</title>
</head>
<body>
    <h1>Testando Cálculos em JavaScript</h1>
    <script>
       
        let nota1 = parseFloat(prompt("entre com a primeira nota"))
        document.write("<br>A primeira nota é: "+ nota1)

         let nota2 = parseFloat(prompt("entre com a segunda nota"))
        document.write("<br>A primeira nota é: "+ nota2)

         let nota3 = parseFloat(prompt("entre com a terceira nota"))
        document.write("<br>A primeira nota é: "+ nota3)

         let nota4 = parseFloat(prompt("entre com a quarta nota"))
        document.write("<br>A primeira nota é: "+ nota4)
        
        let media = (nota1+ nota2+ nota3+ nota4)/4
        document.write("<br> a média das notas é: " + media)
        
        if(media >= 6){
            alert("Você está aprovado! Parabéns!")
        }
        else if(media >=5){
            alert("Você está de recuperação! Estude mais um pouco")
        }
        
        else{
            alert("Você está reprovado! Vacilão!")
        }
    </script>
    
</body>
</html>
