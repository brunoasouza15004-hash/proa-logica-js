<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculando o IMC</title>
</head>
<body>
    <H1>Calculando o IMC com Javascript</H1>

    <script>

    let peso = parseFloat(prompt("DIgite seu peso: ").toLowerCase())

    let altura = parseFloat(prompt("Digite sua altura: ").toLowerCase())
    
    let imc = peso / (altura * altura)
    document.write("O seu imc é: "+imc.toFixed(2))
 
    if(imc >= 18.5 && imc <=24.9){
            alert("Você está com o peso normal!")
        }

        else if(imc <=18.5){
            alert("Você está abaixo do peso")
        }

        else if(imc >=25.5 && imc <=29.9){
            alert("Você está com sobrepeso")
        }

        else if(imc >=30.0 && imc <=34.9){
            alert("Você está com obesidade grau 1")
        }

         else if(imc >=35.0 && imc <=39.9){
            alert("Você está com obesidade grau 2")
        }

         else if(imc >=40.0){
            alert("Você está com obesidade grau 3 ou Mórbida")
        }
        
        else{
            alert("Peso ou Altura inválidos")
        }
    </script>
    
</body>
</html>
