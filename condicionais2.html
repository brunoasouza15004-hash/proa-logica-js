<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>>Comandos Condicionais usando javascript</title>
</head>
<body>
    <h1> Testando comandos (if)  (else if) (else) </h1>
    <script>
        
        let cor = (prompt("escolha uma cor entre: (Verde, Amarelo e Vermelho) : ").toLowerCase())


         if(cor === "verde"){
            alert("Siga")
         }

         else if(cor === "amarelo"){
            alert("atenção")
         }
         else if(cor === "vermelho"){
            alert("PARE")
         }

         else {
            alert("cor inválida!")
         }
    </script>
    
</body>
</html>
