<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando comandos usando Javascript</title>
</head>
<body>
    <h1>Testando comandos usando javascript</h1>
    <script>
        let nome="Bruno" //variavel do tipo string(letras, números e caracteres especiais)
        let idade= 17 // variavel do tipo int( valores númericos inteiros)
        let altura= 1.76 // variavel do tipo float( valores númericos quebrados )
        let salario= 38000.55 // variavel do tipo double ( valores que usam muito esp)
        let mestrado= false // variavel do tipo boolean ( verdadeiro ou falso )

        document.write("Meu nome é: "+ nome)
        document.write("<br>Minha idade é: "+ idade)
        document.write("<br>Minha altura é: "+ altura)
        document.write("<br>Meu salário é: "+ salario)
        document.write("<br>Eu tenho mestrado? "+ mestrado)

         let nome1="Vinicius" //variavel do tipo string(letras, números e caracteres especiais)
        let idade1= 19 // variavel do tipo int( valores númericos inteiros)
        let altura1= 1.80 // variavel do tipo float( valores númericos quebrados )
        let salario1= 58000.55 // variavel do tipo double ( valores que usam muito esp)
        let mestrado1= true // variavel do tipo boolean ( verdadeiro ou falso )

        document.write("<br><br>Meu nome é: "+ nome1)
        document.write("<br>Minha idade é: "+ idade1)
        document.write("<br>Minha altura é: "+ altura1)
        document.write("<br>Meu salário é: "+ salario1)
        document.write("<br>Eu tenho mestrado? "+ mestrado1)


    </script>
    
</body>
</html>
