<body>
    <h1>
        Testando cálculos usando o javascript

   <script>
    let numero1 = prompt ("entre com o primeiro número")
     document.write("O primeiro número é: " + numero1)

    let numero2 = prompt ("entre com o segundo número")
      document.write("<br>O segundo número é: "+ numero2)

      
        let soma = numero1 + numero2
        document.write("a soma dos números é: "+ soma)

        let media = (numero1 + numero2) /2
         document.write("<br>a soma dos números é: "+ media)
        let multiplica= numero1 * numero2
        document.write("<br>a multiplicação dos números é: "+ multiplica)

        let divisao = numero1 / numero2
        document.write("<br>a divisão dos números é: "+ divisao)

        
       
       
        
        

    
  
   </script>
