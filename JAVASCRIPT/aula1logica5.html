<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando calculos </title>
</head>
<body>
    <h1>
        Testando cálculos usando o javascript
    </h1>
    <script>

        let nota1 = parseFloat(prompt("Digite a primeira nota:"))
        let nota2 = parseFloat(prompt("Digite a segunda nota:"))
        let nota3 = parseFloat(prompt("Digite a terceira nota:"))
        let nota4 = parseFloat(prompt("Digite a quarta nota:"))
        let media = (nota1 + nota2 + nota3 + nota4) /2

        document.write("A nota do aluno no primeiro bimestre: "+ nota1)
        document.write("<br>A nota do aluno no segundo bimestre: "+ nota2)
        document.write("<br>A nota do aluno no terceiro bimestre: "+ nota3)
        document.write("<br>A nota do aluno no quarto bimestre: "+ nota4)
        document.write("<br>A média do aluno é: "+ media)

    </script>
    </body>
</html>
